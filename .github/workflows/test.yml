name: Test the book

on:
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build and Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the branch
        uses: actions/checkout@v3

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: uv sync --group book

      - name: Cache notebook execution
        uses: actions/cache@v4
        with:
          path: book/_build/execute
          key: myst-execute-${{ runner.os }}-${{ hashFiles('book/**/*.md', 'uv.lock') }}
          restore-keys: |
            myst-execute-${{ runner.os }}-

      - name: Build the book
        run: |
          cd book && uv run jupyter book build --execute --html
