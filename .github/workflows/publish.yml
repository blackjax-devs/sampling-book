# Publish the documentation on merge and nightly
name: Publish the book

on:
  push:
    branches: [main]
  schedule:
    # every day at 4:00 -- ready for my morning coffee
    # cheks compatibility with blackjax-nightly
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the branch
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.13

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Cache notebook execution
        uses: actions/cache@v4
        with:
          path: book/_build/execute
          key: myst-execute-${{ runner.os }}-${{ hashFiles('book/**/*.md', 'requirements.txt') }}
          restore-keys: |
            myst-execute-${{ runner.os }}-

      - name: Build the book
        env:
          BASE_URL: /${{ github.event.repository.name }}
        run: |
          cd book && jupyter book build --execute --html

      - name: Publish to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: gh-pages
          folder: ./book/_build/html
          clean: true
